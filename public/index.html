<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.A.A Flow — محرك أتمتة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--surface:#0f1629;--card:#151e35;--card2:#1a2540;
  --border:#1e2d4a;--border2:#243358;
  --accent:#00d4ff;--accent2:#7c3aed;--accent3:#10b981;
  --warn:#f59e0b;--danger:#ef4444;
  --text:#e2e8f0;--muted:#64748b;--muted2:#8b949e;
  --node-h:60px;--node-w:200px;
  --sidebar:260px;--panel:300px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif}

/* ── Sidebar ─────────────────────────────────────────────── */
#sidebar{position:fixed;top:0;right:0;width:var(--sidebar);height:100%;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:100;}
#sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:18px;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 0%,var(--accent) 50%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#sidebar-search{margin:10px;padding:8px 12px;background:var(--card);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:13px;outline:none;width:calc(100% - 20px);direction:rtl;}
#sidebar-search:focus{border-color:var(--accent)}
#node-list{flex:1;overflow-y:auto;padding:4px 10px 12px}
.node-category{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:10px 4px 6px;font-family:'IBM Plex Mono',monospace}
.node-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:grab;border:1px solid transparent;margin-bottom:3px;transition:all .15s;font-size:13px;user-select:none;}
.node-item:hover{background:var(--card2);border-color:var(--border2)}
.node-item:active{cursor:grabbing}
.node-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

/* ── Top Bar ──────────────────────────────────────────────── */
#topbar{position:fixed;top:0;left:0;right:var(--sidebar);height:50px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:99;gap:10px;}
.tb-left,.tb-right{display:flex;align-items:center;gap:6px}
.tb-btn{padding:5px 12px;border-radius:7px;border:1px solid var(--border2);background:var(--card);color:var(--text);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:5px;}
.tb-btn:hover{background:var(--card2);border-color:var(--muted2)}
.tb-btn:disabled{opacity:.5;cursor:not-allowed}
.tb-btn.primary{background:linear-gradient(135deg,var(--accent2),#4f46e5);border-color:transparent;color:#fff}
.tb-btn.primary:hover{opacity:.9}
.tb-btn.run{background:linear-gradient(135deg,var(--accent3),#059669);border-color:transparent;color:#fff}
.tb-btn.run:hover:not(:disabled){opacity:.9}
.tb-btn.danger{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--danger)}
.wf-name{background:transparent;border:1px solid transparent;color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;font-weight:500;padding:4px 8px;border-radius:6px;outline:none;min-width:160px;text-align:center;}
.wf-name:hover{border-color:var(--border2)}
.wf-name:focus{border-color:var(--accent);background:var(--card)}

/* Status badge */
#ws-status{width:8px;height:8px;border-radius:50%;background:var(--danger);flex-shrink:0;transition:background .3s;}
#ws-status.ok{background:var(--accent3)}

/* ── Canvas ───────────────────────────────────────────────── */
#canvas-wrap{position:fixed;top:50px;left:0;right:var(--sidebar);bottom:0;overflow:hidden;cursor:default;}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0;}
#grid-svg{position:absolute;top:0;left:0;pointer-events:none}
#connections-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
#temp-conn{stroke:var(--accent);stroke-width:2;fill:none;stroke-dasharray:6 4;pointer-events:none;display:none}

/* ── Nodes ────────────────────────────────────────────────── */
.wf-node{position:absolute;min-width:var(--node-w);background:var(--card);border:1.5px solid var(--border2);border-radius:12px;cursor:grab;user-select:none;transition:border-color .15s,box-shadow .15s;z-index:10;}
.wf-node:hover{border-color:var(--muted);box-shadow:0 0 20px rgba(0,0,0,.4)}
.wf-node.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,212,255,.15)}
.wf-node.running{animation:node-run .6s ease-in-out infinite alternate}
.wf-node.done{border-color:var(--accent3);box-shadow:0 0 12px rgba(16,185,129,.2)}
.wf-node.error{border-color:var(--danger);box-shadow:0 0 12px rgba(239,68,68,.2)}
@keyframes node-run{from{box-shadow:0 0 8px rgba(0,212,255,.3)}to{box-shadow:0 0 24px rgba(0,212,255,.7)}}
.node-header{padding:10px 12px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border);border-radius:11px 11px 0 0;}
.node-header-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.node-header-text{flex:1;min-width:0}
.node-title{font-size:13px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-type{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1px}
.node-status{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
.node-status.ok{background:var(--accent3)}
.node-status.err{background:var(--danger)}
.node-status.run{background:var(--accent);animation:blink .5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.node-body{padding:8px 12px;font-size:12px;color:var(--muted2);line-height:1.5}
.node-param{display:flex;justify-content:space-between;margin-bottom:3px}
.node-param-label{color:var(--muted)}
.node-param-val{color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.node-ports{padding:4px 0 8px;display:flex;flex-direction:column;gap:0}
.port-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0}
.port{width:12px;height:12px;border-radius:50%;border:2px solid var(--border2);background:var(--card);cursor:crosshair;transition:all .15s;z-index:20;flex-shrink:0;position:relative;}
.port:hover,.port.hover{border-color:var(--accent);background:var(--accent);box-shadow:0 0 8px rgba(0,212,255,.5)}
.port.out{margin-right:-7px}
.port.in{margin-left:-7px}
.port-label{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;padding:0 7px}

/* ── Props Panel ──────────────────────────────────────────── */
#props-panel{position:fixed;bottom:0;left:0;width:var(--panel);background:var(--surface);border-top:1px solid var(--border);border-right:1px solid var(--border);border-radius:0 12px 0 0;max-height:65%;transform:translateY(100%);transition:transform .3s;z-index:101;display:flex;flex-direction:column;}
#props-panel.open{transform:translateY(0)}
#props-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
#props-title{font-size:14px;font-weight:700}
#props-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:2px 6px}
#props-body{padding:14px;overflow-y:auto;flex:1}
.prop-group{margin-bottom:14px}
.prop-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-family:'IBM Plex Mono',monospace}
.prop-input,.prop-select,.prop-textarea{width:100%;padding:7px 10px;background:var(--card);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:13px;outline:none;transition:border-color .15s;resize:vertical;}
.prop-input:focus,.prop-select:focus,.prop-textarea:focus{border-color:var(--accent)}
.prop-select option{background:var(--card2)}
.prop-toggle{display:flex;align-items:center;justify-content:space-between}
.toggle{width:36px;height:20px;border-radius:10px;background:var(--border2);cursor:pointer;position:relative;transition:background .2s}
.toggle.on{background:var(--accent3)}
.toggle::after{content:'';position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(-16px)}

/* Webhook URL box */
.webhook-url{background:var(--card);border:1px solid var(--border2);border-radius:7px;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);word-break:break-all;cursor:pointer;transition:border-color .15s;}
.webhook-url:hover{border-color:var(--accent)}

/* ── Workflows Panel ─────────────────────────────────────── */
#wf-panel{position:fixed;top:50px;left:0;width:260px;background:var(--surface);border-right:1px solid var(--border);height:calc(100% - 50px);transform:translateX(-100%);transition:transform .3s;z-index:102;display:flex;flex-direction:column;}
#wf-panel.open{transform:translateX(0)}
#wf-panel-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
#wf-panel-header span{font-weight:700;font-size:14px}
#wf-list{flex:1;overflow-y:auto;padding:8px}
.wf-item{padding:10px 12px;border-radius:8px;border:1px solid var(--border2);margin-bottom:6px;cursor:pointer;transition:all .15s;}
.wf-item:hover{background:var(--card2);border-color:var(--muted)}
.wf-item-name{font-size:13px;font-weight:600}
.wf-item-date{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:2px}
.wf-item-actions{display:flex;gap:6px;margin-top:6px}
.wf-item-btn{padding:3px 8px;border-radius:5px;border:1px solid var(--border2);background:var(--card);color:var(--muted2);cursor:pointer;font-size:11px;font-family:'Tajawal',sans-serif;}
.wf-item-btn:hover{background:var(--card2);color:var(--text)}
.wf-item-btn.danger:hover{color:var(--danger);border-color:rgba(239,68,68,.4)}

/* ── Log Panel ────────────────────────────────────────────── */
#log-panel{position:fixed;bottom:0;right:var(--sidebar);left:0;background:rgba(10,14,26,.95);border-top:1px solid var(--border);height:0;transition:height .3s;overflow:hidden;z-index:98;backdrop-filter:blur(8px);}
#log-panel.open{height:200px}
#log-header{padding:7px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:12px;}
#log-body{height:160px;overflow-y:auto;padding:6px 14px;font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:1.7;}
.log-line{display:block;margin-bottom:1px}
.l-info{color:var(--muted2)}.l-ok{color:var(--accent3)}.l-err{color:var(--danger)}.l-run{color:var(--accent)}.l-warn{color:var(--warn)}

/* ── Minimap ──────────────────────────────────────────────── */
#minimap{position:fixed;bottom:16px;left:16px;width:160px;height:100px;background:rgba(15,22,41,.9);border:1px solid var(--border);border-radius:8px;overflow:hidden;pointer-events:none;z-index:97;}
#minimap-canvas{width:100%;height:100%}

/* ── Context Menu ─────────────────────────────────────────── */
#ctx-menu{position:fixed;background:var(--card);border:1px solid var(--border2);border-radius:9px;padding:6px;z-index:999;display:none;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.ctx-item{padding:7px 12px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;transition:background .1s;}
.ctx-item:hover{background:var(--card2)}
.ctx-item.danger{color:var(--danger)}
.ctx-divider{height:1px;background:var(--border);margin:4px 0}

/* ── Toast ────────────────────────────────────────────────── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:10px 20px;font-size:13px;z-index:9999;transition:transform .3s;pointer-events:none;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ── Scrollbars ───────────────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── Welcome ────────────────────────────────────────────────*/
#welcome{position:fixed;inset:0;background:rgba(10,14,26,.85);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(8px);}
#welcome-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:36px;max-width:480px;width:90%;text-align:center;}
#welcome-card h1{font-size:30px;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,#fff 0%,var(--accent) 50%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#welcome-card p{color:var(--muted2);margin-bottom:22px;line-height:1.7}
.quick-start{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
.qs-btn{padding:12px;border-radius:9px;border:1px solid var(--border2);background:var(--card);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;color:var(--text);transition:all .15s;}
.qs-btn:hover{background:var(--card2);border-color:var(--muted)}
</style>
</head>
<body>

<!-- Welcome -->
<div id="welcome">
  <div id="welcome-card">
    <h1>⚡ H.A.A Flow</h1>
    <p>محرك أتمتة بصري حقيقي — نودات تعمل فعلاً مع Claude AI، Telegram، GitHub وأكثر</p>
    <div class="quick-start">
      <div class="qs-btn" onclick="loadTemplate('telegram-bot')">🤖 بوت تيليجرام</div>
      <div class="qs-btn" onclick="loadTemplate('ai-pipeline')">🧠 AI Pipeline</div>
      <div class="qs-btn" onclick="loadTemplate('github-auto')">🐙 GitHub Auto</div>
      <div class="qs-btn" onclick="loadTemplate('data-fetch')">📊 جلب بيانات</div>
    </div>
    <button class="tb-btn primary" onclick="closeWelcome()" style="width:100%;justify-content:center;padding:11px">ابدأ من الصفر →</button>
  </div>
</div>

<!-- Top bar -->
<div id="topbar">
  <div class="tb-left">
    <div id="ws-status" title="WebSocket"></div>
    <button class="tb-btn" onclick="toggleWfPanel()" title="الـ Workflows">📂</button>
    <button class="tb-btn" onclick="zoomIn()">＋</button>
    <button class="tb-btn" onclick="zoomOut()">－</button>
    <button class="tb-btn" onclick="fitAll()">⊡</button>
    <span id="zoom-label" style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);min-width:40px">100%</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <input class="wf-name" id="wf-name" value="Workflow جديد" spellcheck="false">
  </div>
  <div class="tb-right">
    <button class="tb-btn" onclick="newWorkflow()">＋ جديد</button>
    <button class="tb-btn" onclick="clearCanvas()">🗑</button>
    <button class="tb-btn" onclick="saveWorkflow()">💾 حفظ</button>
    <button class="tb-btn run" id="run-btn" onclick="runWorkflow()">▶ تشغيل</button>
  </div>
</div>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <span class="logo">H.A.A Flow</span>
    <span style="font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace">v1.0</span>
  </div>
  <input id="sidebar-search" placeholder="🔍 ابحث عن نود..." oninput="filterNodes(this.value)">
  <div id="node-list"></div>
</div>

<!-- Workflows list panel -->
<div id="wf-panel">
  <div id="wf-panel-header">
    <span>💾 الـ Workflows</span>
    <button class="tb-btn" onclick="toggleWfPanel()" style="padding:3px 8px">✕</button>
  </div>
  <div style="padding:8px">
    <button class="tb-btn primary" onclick="newWorkflow();toggleWfPanel()" style="width:100%;justify-content:center">＋ Workflow جديد</button>
  </div>
  <div id="wf-list"></div>
</div>

<!-- Canvas -->
<div id="canvas-wrap"
  onmousedown="canvasMouseDown(event)"
  onmousemove="canvasMouseMove(event)"
  onmouseup="canvasMouseUp(event)"
  onwheel="canvasWheel(event)"
  oncontextmenu="return false"
  ondragover="event.preventDefault()"
  ondrop="canvasDrop(event)">
  <svg id="grid-svg" width="100%" height="100%"></svg>
  <div id="canvas">
    <svg id="connections-svg" style="position:absolute;top:0;left:0;width:20000px;height:20000px;overflow:visible">
      <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L6,3 L0,6 Z" fill="var(--muted)"/>
        </marker>
        <marker id="arrowhead-active" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L6,3 L0,6 Z" fill="var(--accent3)"/>
        </marker>
      </defs>
      <path id="temp-conn" fill="none"/>
    </svg>
  </div>
</div>

<!-- Props panel -->
<div id="props-panel">
  <div id="props-header">
    <span id="props-title">خصائص النود</span>
    <button id="props-close" onclick="closeProps()">✕</button>
  </div>
  <div id="props-body"></div>
</div>

<!-- Log panel -->
<div id="log-panel">
  <div id="log-header">
    <span style="color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:12px">EXECUTION LOG</span>
    <div style="display:flex;gap:6px">
      <button class="tb-btn" onclick="clearLog()" style="padding:2px 8px;font-size:11px">مسح</button>
      <button class="tb-btn" onclick="toggleLog()" style="padding:2px 8px;font-size:11px">إغلاق</button>
    </div>
  </div>
  <div id="log-body"></div>
</div>

<!-- Minimap -->
<div id="minimap"><canvas id="minimap-canvas"></canvas></div>

<!-- Context Menu -->
<div id="ctx-menu"></div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
//  NODE DEFINITIONS
// ══════════════════════════════════════════════════════════════
const NODE_DEFS = [
  {cat:'⚡ محفزات',items:[
    {type:'webhook',      label:'Webhook',         icon:'🌐', color:'#1e3a5f', iconBg:'#1e4a8a', desc:'HTTP Webhook trigger',
     ports:{in:[],out:['output']},
     params:[{k:'path',l:'المسار',v:'/webhook',t:'text'},{k:'method',l:'الطريقة',v:'POST',t:'select',opts:['GET','POST','PUT','DELETE']}]},
    {type:'schedule',     label:'جدول زمني',       icon:'⏰', color:'#1e3a3f', iconBg:'#0f6e56', desc:'Cron schedule',
     ports:{in:[],out:['output']},
     params:[{k:'cron',l:'Cron',v:'0 9 * * *',t:'text'},{k:'tz',l:'المنطقة الزمنية',v:'Asia/Baghdad',t:'text'}]},
    {type:'telegram_trigger',label:'Telegram In',  icon:'✈', color:'#1a2d3f', iconBg:'#0077b5', desc:'استقبال رسالة Telegram',
     ports:{in:[],out:['message','chat_id']},
     params:[{k:'token',l:'Bot Token',v:'',t:'password'},{k:'commands',l:'الأوامر',v:'/start,/help',t:'text'}]},
    {type:'github_event', label:'GitHub Event',   icon:'🐙', color:'#1a2433', iconBg:'#333',     desc:'GitHub webhook event',
     ports:{in:[],out:['payload']},
     params:[{k:'event',l:'الحدث',v:'push',t:'select',opts:['push','pull_request','issues','release']}]},
  ]},
  {cat:'🧠 ذكاء اصطناعي',items:[
    {type:'claude',       label:'Claude AI',       icon:'🤖', color:'#2d1e3f', iconBg:'#7c3aed', desc:'Claude API الحقيقي',
     ports:{in:['prompt'],out:['response','tokens']},
     params:[{k:'model',l:'النموذج',v:'claude-opus-4-5',t:'select',opts:['claude-opus-4-5','claude-sonnet-4-6','claude-haiku-4-5-20251001']},{k:'max_tokens',l:'Max Tokens',v:'1000',t:'text'},{k:'system',l:'System Prompt',v:'أنت مساعد مفيد.',t:'textarea'}]},
    {type:'openai',       label:'OpenAI',          icon:'✨', color:'#1a2d1f', iconBg:'#10a37f', desc:'OpenAI GPT API الحقيقي',
     ports:{in:['prompt'],out:['response']},
     params:[{k:'model',l:'النموذج',v:'gpt-4o',t:'select',opts:['gpt-4o','gpt-4-turbo','gpt-3.5-turbo']},{k:'temperature',l:'Temperature',v:'0.7',t:'text'}]},
    {type:'text_classify',label:'تصنيف نص',        icon:'🏷', color:'#2d2a1e', iconBg:'#b45309', desc:'تصنيف النصوص بـ AI',
     ports:{in:['text'],out:['category','confidence']},

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let nodes = [], connections = [], selectedNode = null;
let scale = 1, panX = 0, panY = 0;
let isPanning = false, panStart = {x:0,y:0};
let isDragging = false, dragNode = null, dragOffset = {x:0,y:0};
let isConnecting = false, connStart = null, tempPath = null;
let nodeIdCounter = 0;
let currentWfId = null;
const GRID = 20;

// ── WebSocket ─────────────────────────────────────────────────
let ws = null;
let wsReconnectTimer = null;

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('ws-status').classList.add('ok');
    log('ok', '🔌 متصل بالـ Server');
    clearTimeout(wsReconnectTimer);
  };

  ws.onmessage = (e) => {
    try { handleServerMsg(JSON.parse(e.data)); } catch(_) {}
  };

  ws.onclose = () => {
    document.getElementById('ws-status').classList.remove('ok');
    wsReconnectTimer = setTimeout(connectWS, 3000);
  };

  ws.onerror = () => ws.close();
}

function handleServerMsg(msg) {
  switch(msg.type) {
    case 'node_status':
      setNodeStatus(msg.nodeId, msg.status);
      if (msg.preview && msg.nodeId) {
        const el = document.getElementById('body-' + msg.nodeId);
        if(el) {
          const div = document.createElement('div');
          div.style.cssText = 'font-size:10px;color:var(--accent3);font-family:"IBM Plex Mono",monospace;margin-top:4px;word-break:break-all;opacity:.8;';
          div.textContent = msg.preview.slice(0,80);
          el.appendChild(div);
        }
      }
      break;
    case 'activate_connection':
      const conn = connections.find(c => c.id === msg.connId);
      if(conn){ conn.active = true; renderConnections(); }
      break;
    case 'log':
      log(msg.level, msg.message);
      break;
    case 'execution_complete':
      const btn = document.getElementById('run-btn');
      btn.disabled = false; btn.innerHTML = '▶ تشغيل';
      toast('✅ اكتمل التنفيذ!');
      updateMinimap();
      break;
  }
}

// ══════════════════════════════════════════════════════════════
//  API CALLS
// ══════════════════════════════════════════════════════════════
async function apiSave() {
  const data = {
    id: currentWfId,
    name: document.getElementById('wf-name').value,
    nodes,
    connections,
    updatedAt: new Date().toISOString()
  };
  const method = currentWfId ? 'PUT' : 'POST';
  const url    = currentWfId ? `/api/workflows/${currentWfId}` : '/api/workflows';
  const res    = await fetch(url, {
    method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)
  });
  const saved = await res.json();
  currentWfId = saved.id;
  return saved;
}

async function apiLoad(id) {
  const res = await fetch(`/api/workflows/${id}`);
  return await res.json();
}

async function apiList() {
  const res = await fetch('/api/workflows');
  return await res.json();
}

async function apiDelete(id) {
  await fetch(`/api/workflows/${id}`, { method: 'DELETE' });
}

// ── Save ──────────────────────────────────────────────────────
async function saveWorkflow() {
  try {
    await apiSave();
    toast('💾 تم الحفظ!');
    log('ok', `تم حفظ "${document.getElementById('wf-name').value}"`);
  } catch(e) {
    toast('❌ فشل الحفظ: ' + e.message);
  }
}

// ── New ───────────────────────────────────────────────────────
function newWorkflow() {
  clearNodesOnly();
  currentWfId = null;
  document.getElementById('wf-name').value = 'Workflow جديد';
  log('info', 'تم إنشاء Workflow جديد');
}

// ── Workflows panel ──────────────────────────────────────────
function toggleWfPanel() {
  const p = document.getElementById('wf-panel');
  p.classList.toggle('open');
  if(p.classList.contains('open')) refreshWfList();
}

async function refreshWfList() {
  const list = document.getElementById('wf-list');
  list.innerHTML = '<div style="padding:12px;color:var(--muted);font-size:13px">جارٍ التحميل...</div>';
  try {
    const wfs = await apiList();
    if(!wfs.length) {
      list.innerHTML = '<div style="padding:12px;color:var(--muted);font-size:13px">لا توجد Workflows محفوظة</div>';
      return;
    }
    list.innerHTML = wfs.map(w => `
      <div class="wf-item">
        <div class="wf-item-name">${w.name || 'Workflow'}</div>
        <div class="wf-item-date">${new Date(w.updatedAt).toLocaleString('ar')}</div>
        <div class="wf-item-actions">
          <button class="wf-item-btn" onclick="loadWorkflow('${w.id}')">📂 فتح</button>
          <button class="wf-item-btn" onclick="copyWebhookUrl('${w.id}')">🔗 Webhook</button>
          <button class="wf-item-btn danger" onclick="deleteWf('${w.id}')">🗑</button>
        </div>
      </div>`).join('');
  } catch(e) {
    list.innerHTML = '<div style="padding:12px;color:var(--danger);font-size:13px">تعذر الاتصال بالـ Server</div>';
  }
}

async function loadWorkflow(id) {
  try {
    const wf = await apiLoad(id);
    clearNodesOnly();
    currentWfId = wf.id;
    document.getElementById('wf-name').value = wf.name || 'Workflow';
    nodeIdCounter = 0;
    (wf.nodes || []).forEach(n => {
      nodes.push(n);
      renderNode(n);
      const num = parseInt(n.id.replace('n',''));
      if(num > nodeIdCounter) nodeIdCounter = num;
    });
    connections.length = 0;
    (wf.connections || []).forEach(c => connections.push(c));
    renderConnections();
    fitAll();
    toggleWfPanel();
    log('ok', `تم تحميل "${wf.name}"`);
    toast('📂 تم التحميل!');
  } catch(e) {
    toast('❌ فشل التحميل');
  }
}

async function deleteWf(id) {
  if(!confirm('حذف هذا الـ Workflow نهائياً؟')) return;
  await apiDelete(id);
  if(currentWfId === id) { newWorkflow(); }
  refreshWfList();
  toast('🗑 تم الحذف');
}

function copyWebhookUrl(id) {
  const url = `${location.origin}/api/webhooks/${id}`;
  navigator.clipboard.writeText(url).then(() => toast('📋 تم نسخ رابط الـ Webhook!'));
}

// ── Run ───────────────────────────────────────────────────────
async function runWorkflow() {
  if(!nodes.length){ toast('أضف نودات أولاً'); return; }

  // Auto-save before running
  try { await apiSave(); } catch(_) {}

  const btn = document.getElementById('run-btn');
  btn.disabled = true; btn.innerHTML = '⏳ جارٍ...';

  document.getElementById('log-panel').classList.add('open');
  log('run', '════ بدء التنفيذ ════');

  // Reset states
  nodes.forEach(n => setNodeStatus(n.id, 'idle'));
  connections.forEach(c => { c.active = false; });
  renderConnections();

  if(ws && ws.readyState === 1) {
    ws.send(JSON.stringify({
      type: 'execute',
      workflow: {
        id: currentWfId,
        name: document.getElementById('wf-name').value,
        nodes,
        connections
      }
    }));
  } else {
    log('err', 'غير متصل بالـ Server — تأكد من تشغيل server.js');
    btn.disabled = false; btn.innerHTML = '▶ تشغيل';
    toast('❌ غير متصل بالـ Server');
  }
}

function addNode(def, pos) {
  const node = {
    id: 'n'+(++nodeIdCounter), type: def.type, label: def.label,
    icon: def.icon, color: def.color, iconBg: def.iconBg,
    x: pos.x, y: pos.y, ports: def.ports,
    params: def.params ? def.params.map(p=>({...p})) : [],
    status: 'idle'
  };
  nodes.push(node);
  renderNode(node);
  updateMinimap();
  return node;
}

function renderNode(node) {
  const el = document.createElement('div');
  el.className = 'wf-node';
  el.id = 'node-' + node.id;
  el.style.cssText = `left:${node.x}px;top:${node.y}px;`;

  const outs = node.ports.out || [];
  const ins  = node.ports.in  || [];
  const maxP = Math.max(outs.length, ins.length, 1);

  el.innerHTML = `
    <div class="node-header" style="background:${node.color}">
      <div class="node-header-icon" style="background:${node.iconBg}">${node.icon}</div>
      <div class="node-header-text">
        <div class="node-title">${node.label}</div>
        <div class="node-type">${node.type}</div>
      </div>
      <div class="node-status" id="status-${node.id}"></div>
    </div>
    <div class="node-body" id="body-${node.id}">
      ${node.params.slice(0,2).map(p=>`
        <div class="node-param">
          <span class="node-param-label">${p.l}</span>
          <span class="node-param-val">${p.v||'—'}</span>
        </div>`).join('')}
    </div>
    <div class="node-ports" id="ports-${node.id}">
      ${Array.from({length:maxP},(_,i)=>`
        <div class="port-row" style="position:relative;height:22px;">
          ${ins[i]?`<div class="port in" data-node="${node.id}" data-port="${ins[i]}" data-dir="in" title="${ins[i]}" onmousedown="portMouseDown(event,this)"></div><span class="port-label" style="margin-right:4px">${ins[i]}</span>`:'<div style="width:12px;height:12px;flex-shrink:0"></div><span></span>'}
          <span style="flex:1"></span>
          ${outs[i]?`<span class="port-label" style="margin-left:4px">${outs[i]}</span><div class="port out" data-node="${node.id}" data-port="${outs[i]}" data-dir="out" title="${outs[i]}" onmousedown="portMouseDown(event,this)"></div>`:'<span></span><div style="width:12px;height:12px;flex-shrink:0"></div>'}
        </div>`).join('')}
    </div>`;

  el.addEventListener('mousedown', e => nodeMouseDown(e, node.id));
  el.addEventListener('dblclick',  () => openProps(node.id));
  el.addEventListener('contextmenu', e => showNodeCtxMenu(e, node.id));
  document.getElementById('canvas').appendChild(el);
}

function updateNodeEl(id) {
  const node = nodes.find(n=>n.id===id);
  if(!node) return;
  const body = document.getElementById('body-'+id);
  if(body) body.innerHTML = node.params.slice(0,2).map(p=>`
    <div class="node-param">
      <span class="node-param-label">${p.l}</span>
      <span class="node-param-val">${p.v||'—'}</span>
    </div>`).join('');
}

function setNodeStatus(id, status) {
  const node = nodes.find(n=>n.id===id);
  if(node) node.status = status;
  const el = document.getElementById('node-'+id);
  if(!el) return;
  el.className = 'wf-node' + (id === selectedNode?.id ? ' selected' : '');
  if(status==='running') el.classList.add('running');
  if(status==='done')    el.classList.add('done');
  if(status==='error')   el.classList.add('error');
  const dot = document.getElementById('status-'+id);
  if(dot) dot.className = 'node-status'
    + (status==='done'?' ok':status==='error'?' err':status==='running'?' run':'');
}

// ══════════════════════════════════════════════════════════════
//  CONNECTIONS
// ══════════════════════════════════════════════════════════════
function renderConnections() {
  document.querySelectorAll('.conn-path').forEach(p=>p.remove());
  connections.forEach(c => drawConnection(c));
}

function drawConnection(conn) {
  const p1 = getPortPos(conn.from, conn.fromPort, 'out');
  const p2 = getPortPos(conn.to,   conn.toPort,   'in');
  if(!p1||!p2) return;
  const path = createConnPath(p1, p2, conn.active);
  path.classList.add('conn-path');
  path.dataset.connId = conn.id;
  path.addEventListener('contextmenu', e => showConnCtxMenu(e, conn.id));
  path.addEventListener('mouseenter', () => path.style.strokeWidth='2.5');
  path.addEventListener('mouseleave', () => path.style.strokeWidth=conn.active?'2':'1.5');
  document.getElementById('connections-svg').appendChild(path);
}

function createConnPath(p1, p2, active=false) {
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  const dx   = Math.abs(p2.x-p1.x)*0.5;
  path.setAttribute('d', `M${p1.x},${p1.y} C${p1.x+dx},${p1.y} ${p2.x-dx},${p2.y} ${p2.x},${p2.y}`);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', active ? '#10b981' : '#3b5280');
  path.setAttribute('stroke-width', active ? '2' : '1.5');
  path.setAttribute('marker-end', `url(#${active?'arrowhead-active':'arrowhead'})`);
  path.style.cursor = 'pointer';
  return path;
}

function getPortPos(nodeId, portName, dir) {
  const el = document.getElementById('node-'+nodeId);
  if(!el) return null;
  const port = el.querySelector(`.port.${dir}[data-port="${portName}"]`);
  if(!port) return null;
  const pr   = port.getBoundingClientRect();
  const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
  return {
    x: (pr.left + pr.width/2  - wrap.left - panX) / scale,
    y: (pr.top  + pr.height/2 - wrap.top  - panY) / scale,
  };
}

// ── Port connecting ───────────────────────────────────────────
function portMouseDown(e, portEl) {
  e.stopPropagation();
  isConnecting = true;
  connStart = { nodeId: portEl.dataset.node, port: portEl.dataset.port, dir: portEl.dataset.dir };
  const pos = getPortPos(connStart.nodeId, connStart.port, connStart.dir);
  if(!pos) return;
  tempPath = document.getElementById('temp-conn');
  tempPath.style.display = 'block';
  updateTempConn(pos, pos);
}

function updateTempConn(p1, p2) {
  if(!tempPath) return;
  const dx = Math.abs(p2.x-p1.x)*0.5;
  tempPath.setAttribute('d',`M${p1.x},${p1.y} C${p1.x+dx},${p1.y} ${p2.x-dx},${p2.y} ${p2.x},${p2.y}`);
}

// ══════════════════════════════════════════════════════════════
//  CANVAS EVENTS
// ══════════════════════════════════════════════════════════════
function canvasMouseDown(e) {
  if(e.button===2) return;
  if(e.target.id==='canvas-wrap'||e.target.id==='grid-svg') {
    selectNode(null);
    isPanning = true;
    panStart  = {x:e.clientX-panX, y:e.clientY-panY};
    document.getElementById('canvas-wrap').style.cursor = 'grabbing';
  }
}

function canvasMouseMove(e) {
  if(isPanning) {
    panX = e.clientX-panStart.x; panY = e.clientY-panStart.y;
    applyTransform(); updateMinimap();
  }
  if(isDragging && dragNode) {
    const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
    const nx = snapGrid((e.clientX-wrap.left-panX)/scale - dragOffset.x);
    const ny = snapGrid((e.clientY-wrap.top -panY)/scale - dragOffset.y);
    dragNode.x = nx; dragNode.y = ny;
    const el = document.getElementById('node-'+dragNode.id);
    if(el){ el.style.left=nx+'px'; el.style.top=ny+'px'; }
    renderConnections(); updateMinimap();
  }
  if(isConnecting && connStart) {
    const pos  = getPortPos(connStart.nodeId, connStart.port, connStart.dir);
    if(!pos) return;
    const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
    const mp   = {x:(e.clientX-wrap.left-panX)/scale, y:(e.clientY-wrap.top-panY)/scale};
    if(connStart.dir==='out') updateTempConn(pos, mp); else updateTempConn(mp, pos);
    document.querySelectorAll('.port').forEach(p=>p.classList.remove('hover'));
    const target = document.elementFromPoint(e.clientX, e.clientY);
    if(target && target.classList.contains('port')) target.classList.add('hover');
  }
}

function canvasMouseUp(e) {
  document.getElementById('canvas-wrap').style.cursor = 'default';
  isPanning = false; isDragging = false; dragNode = null;
  if(isConnecting) {
    isConnecting = false;
    if(tempPath) tempPath.style.display = 'none';
    document.querySelectorAll('.port').forEach(p=>p.classList.remove('hover'));
    const target = document.elementFromPoint(e.clientX, e.clientY);
    if(target && target.classList.contains('port') && target.dataset.node !== connStart?.nodeId) {
      const end = {nodeId:target.dataset.node, port:target.dataset.port, dir:target.dataset.dir};
      let from=connStart, to=end;
      if(from.dir==='in') [from,to]=[to,from];
      if(from.dir==='out' && to.dir==='in') {
        const dup = connections.find(c=>c.from===from.nodeId&&c.fromPort===from.port&&c.to===to.nodeId&&c.toPort===to.port);
        if(!dup) {
          const conn = {id:'c'+(connections.length+1), from:from.nodeId, fromPort:from.port, to:to.nodeId, toPort:to.port, active:false};
          connections.push(conn);
          drawConnection(conn);
          log('ok',`ربط: [${from.port}] → [${to.port}]`);
          updateMinimap();
        }
      }
    }
    connStart = null;
  }
}

function canvasWheel(e) {
  e.preventDefault();
  const f    = e.deltaY > 0 ? 0.9 : 1.1;
  const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
  panX = (e.clientX-wrap.left)-(e.clientX-wrap.left-panX)*f;
  panY = (e.clientY-wrap.top) -(e.clientY-wrap.top -panY)*f;
  scale = Math.max(0.2, Math.min(2, scale*f));
  applyTransform(); updateMinimap();
}

function applyTransform() {
  document.getElementById('canvas').style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
  document.getElementById('zoom-label').textContent  = Math.round(scale*100)+'%';
  drawGrid();
}

// ── Node drag ─────────────────────────────────────────────────
function nodeMouseDown(e, id) {
  if(e.target.classList.contains('port')) return;
  if(e.button===2) return;
  e.stopPropagation();
  selectNode(id);
  isDragging = true;
  dragNode   = nodes.find(n=>n.id===id);
  const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
  dragOffset = {
    x: (e.clientX-wrap.left-panX)/scale - dragNode.x,
    y: (e.clientY-wrap.top -panY)/scale  - dragNode.y
  };
}

function selectNode(id) {
  if(selectedNode) document.getElementById('node-'+selectedNode.id)?.classList.remove('selected');
  selectedNode = id ? nodes.find(n=>n.id===id) : null;
  if(selectedNode) document.getElementById('node-'+id)?.classList.add('selected');
  if(!id) closeProps();
}

// ══════════════════════════════════════════════════════════════
//  PROPERTIES PANEL
// ══════════════════════════════════════════════════════════════
function openProps(id) {
  const node = nodes.find(n=>n.id===id);
  if(!node) return;
  selectNode(id);
  document.getElementById('props-title').textContent = `${node.icon} ${node.label}`;
  const body = document.getElementById('props-body');
  const webhookSection = (!['if','switch','loop','merge','wait','set','filter','transform','debug','code'].includes(node.type) && node.ports?.in?.length===0 && currentWfId)
    ? `<div class="prop-group">
        <div class="prop-label">🔗 Webhook URL</div>
        <div class="webhook-url" title="انقر للنسخ" onclick="copyWebhookUrl('${currentWfId}')">${location.origin}/api/webhooks/${currentWfId}</div>
      </div>` : '';

  body.innerHTML = `
    <div class="prop-group">
      <div class="prop-label">اسم النود</div>
      <input class="prop-input" value="${node.label}" onchange="node_label(event,'${id}')">
    </div>
    ${(node.params||[]).map((p,i)=>`
      <div class="prop-group">
        <div class="prop-label">${p.l}</div>
        ${p.t==='textarea'
          ?`<textarea class="prop-textarea" rows="3" onchange="node_param(event,'${id}',${i})">${p.v||''}</textarea>`
          :p.t==='select'
            ?`<select class="prop-select" onchange="node_param(event,'${id}',${i})">${(p.opts||[]).map(o=>`<option${o===p.v?' selected':''}>${o}</option>`).join('')}</select>`
            :`<input class="prop-input" type="${p.t==='password'?'password':'text'}" value="${p.v||''}" onchange="node_param(event,'${id}',${i})">`
        }
      </div>`).join('')}
    ${webhookSection}
    <div class="prop-group">
      <div class="prop-toggle">
        <div class="prop-label">تفعيل النود</div>
        <div class="toggle on" onclick="this.classList.toggle('on')"></div>
      </div>
    </div>
    <div style="margin-top:14px;display:flex;gap:8px">
      <button class="tb-btn" onclick="duplicateNode('${id}')" style="flex:1;justify-content:center">📋 نسخ</button>
      <button class="tb-btn danger" onclick="deleteNode('${id}')" style="flex:1;justify-content:center">🗑 حذف</button>

  document.getElementById('props-panel').classList.add('open');

window.node_label = (e, id) => {
  const node = nodes.find(n=>n.id===id);
  if(node){ node.label=e.target.value; document.querySelector('#node-'+id+' .node-title').textContent=e.target.value; }
};
window.node_param = (e, id, i) => {
  const node = nodes.find(n=>n.id===id);
  if(node){ node.params[i].v=e.target.value; updateNodeEl(id); }
};

function closeProps() { document.getElementById('props-panel').classList.remove('open'); }

function showConnCtxMenu(e, connId) {
  e.preventDefault();
  const menu = document.getElementById('ctx-menu');

// ══════════════════════════════════════════════════════════════
//  NODE OPERATIONS
// ══════════════════════════════════════════════════════════════
function deleteNode(id) {
  nodes = nodes.filter(n=>n.id!==id);
  connections = connections.filter(c=>c.from!==id&&c.to!==id);
  document.getElementById('node-'+id)?.remove();
  renderConnections();
  if(selectedNode?.id===id) closeProps();
  updateMinimap();
  log('warn',`حُذف النود: ${id}`);
}

function duplicateNode(id) {
  const src = nodes.find(n=>n.id===id);
  if(!src) return;
  const def = findDef(src.type);
  if(!def) return;
  const n = addNode(def, {x:src.x+40, y:src.y+40});
  n.params = src.params.map(p=>({...p}));
  updateNodeEl(n.id);
  toast('📋 تم النسخ');
}

function deleteConnection(connId) {
  connections = connections.filter(c=>c.id!==connId);
  renderConnections(); updateMinimap();
}

function runSingleNode(id) {
  const node = nodes.find(n=>n.id===id);
  if(!node || !ws || ws.readyState!==1) return;
  document.getElementById('log-panel').classList.add('open');
  ws.send(JSON.stringify({
    type: 'execute',
    workflow: { nodes: [node], connections: [] }
  }));
}

// ══════════════════════════════════════════════════════════════
//  GRID
// ══════════════════════════════════════════════════════════════
function drawGrid() {
  const wrap = document.getElementById('canvas-wrap');
  const svg  = document.getElementById('grid-svg');
  const W=wrap.offsetWidth, H=wrap.offsetHeight;
  svg.setAttribute('width',W); svg.setAttribute('height',H);
  const gSize=GRID*scale, ox=((panX%gSize)+gSize)%gSize, oy=((panY%gSize)+gSize)%gSize;
  let d='';
  for(let x=ox;x<W;x+=gSize) d+=`M${x},0 L${x},${H}`;
  for(let y=oy;y<H;y+=gSize) d+=`M0,${y} L${W},${y}`;
  svg.innerHTML=`<path d="${d}" stroke="rgba(255,255,255,0.03)" stroke-width="1" fill="none"/>`;
}

// ══════════════════════════════════════════════════════════════
//  MINIMAP
// ══════════════════════════════════════════════════════════════
function updateMinimap() {
  const c=document.getElementById('minimap-canvas');
  const ctx=c.getContext('2d');
  c.width=160; c.height=100;
  ctx.clearRect(0,0,160,100);
  if(!nodes.length) return;
  const xs=nodes.map(n=>n.x), ys=nodes.map(n=>n.y);
  const minX=Math.min(...xs)-20, maxX=Math.max(...xs)+220;
  const minY=Math.min(...ys)-20, maxY=Math.max(...ys)+80;
  const rw=maxX-minX||200, rh=maxY-minY||120;
  const sc=Math.min(140/rw, 80/rh);
  const tx=n=>(n-minX)*sc+10, ty=n=>(n-minY)*sc+10;
  connections.forEach(conn=>{
    const fn=nodes.find(n=>n.id===conn.from), tn=nodes.find(n=>n.id===conn.to);
    if(!fn||!tn) return;
    ctx.strokeStyle=conn.active?'#10b981':'#3b5280'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(tx(fn.x+100),ty(fn.y+30)); ctx.lineTo(tx(tn.x),ty(tn.y+30)); ctx.stroke();
  });
  nodes.forEach(node=>{
    ctx.fillStyle=node.color||'#151e35';
    ctx.strokeStyle=node.status==='done'?'#10b981':node.status==='error'?'#ef4444':'#3b5280';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(tx(node.x),ty(node.y),200*sc,60*sc,3); ctx.fill(); ctx.stroke();
  });
  const wrap=document.getElementById('canvas-wrap');
  ctx.strokeStyle='rgba(0,212,255,.5)'; ctx.lineWidth=1;
  ctx.strokeRect(tx(-panX/scale),ty(-panY/scale),wrap.offsetWidth/scale*sc,wrap.offsetHeight/scale*sc);
}

// ══════════════════════════════════════════════════════════════
//  ZOOM
// ══════════════════════════════════════════════════════════════
function zoomIn()  { adjustZoom(1.2); }
function zoomOut() { adjustZoom(0.8); }
function adjustZoom(f) {
  const wrap=document.getElementById('canvas-wrap');
  panX=wrap.offsetWidth/2-(wrap.offsetWidth/2-panX)*f;
  panY=wrap.offsetHeight/2-(wrap.offsetHeight/2-panY)*f;
  scale=Math.max(0.2,Math.min(2,scale*f));
  applyTransform(); updateMinimap();
}
function fitAll() {
  if(!nodes.length){ scale=1;panX=0;panY=0;applyTransform();return; }
  const wrap=document.getElementById('canvas-wrap');
  const xs=nodes.map(n=>n.x), ys=nodes.map(n=>n.y);
  const minX=Math.min(...xs)-40, maxX=Math.max(...xs)+240;
  const minY=Math.min(...ys)-40, maxY=Math.max(...ys)+100;
  scale=Math.min(wrap.offsetWidth/(maxX-minX),wrap.offsetHeight/(maxY-minY),1)*0.9;
  panX=wrap.offsetWidth/2-((minX+maxX)/2)*scale;
  panY=wrap.offsetHeight/2-((minY+maxY)/2)*scale;
  applyTransform(); updateMinimap();
}

// ══════════════════════════════════════════════════════════════
//  LOG
// ══════════════════════════════════════════════════════════════
function log(type, msg) {
  const body=document.getElementById('log-body');
  const t=new Date().toLocaleTimeString('en',{hour12:false});
  const span=document.createElement('span');
  span.className=`log-line l-${type}`;
  span.textContent=`[${t}] ${msg}`;
  body.appendChild(span);
  body.scrollTop=body.scrollHeight;
}
function clearLog() { document.getElementById('log-body').innerHTML=''; }
function toggleLog() { document.getElementById('log-panel').classList.toggle('open'); }

// ══════════════════════════════════════════════════════════════
//  SAVE / CLEAR
// ══════════════════════════════════════════════════════════════
function clearCanvas() {
  if(!confirm('مسح كل النودات؟')) return;
  clearNodesOnly();
  log('warn','تم مسح الـ Canvas');
}
function clearNodesOnly() {
  nodes=[]; connections=[]; nodeIdCounter=0;
  document.querySelectorAll('.wf-node').forEach(e=>e.remove());
  document.querySelectorAll('.conn-path').forEach(e=>e.remove());
  selectedNode=null; closeProps(); updateMinimap();
}

// ══════════════════════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════════════════════
function buildSidebar(filter='') {
  const list=document.getElementById('node-list');
  list.innerHTML='';
  NODE_DEFS.forEach(cat=>{
    const items=cat.items.filter(n=>!filter||n.label.includes(filter)||n.desc.includes(filter)||n.type.includes(filter));
    if(!items.length) return;
    const catEl=document.createElement('div');
    catEl.className='node-category'; catEl.textContent=cat.cat;
    list.appendChild(catEl);
    items.forEach(def=>{
      const el=document.createElement('div');
      el.className='node-item'; el.draggable=true;
      el.innerHTML=`<div class="node-icon" style="background:${def.iconBg}20;border:1px solid ${def.iconBg}40">${def.icon}</div>
        <div><div style="font-size:13px;font-weight:600">${def.label}</div>
        <div style="font-size:11px;color:var(--muted)">${def.desc}</div></div>`;
      el.addEventListener('dragstart', e=>e.dataTransfer.setData('nodeType',def.type));
      el.addEventListener('click', ()=>addNode(def, getCanvasCenter()));
      list.appendChild(el);
    });
  });
}
function filterNodes(v) { buildSidebar(v); }

function canvasDrop(e) {
  e.preventDefault();
  const type=e.dataTransfer.getData('nodeType');
  if(!type) return;
  const def=findDef(type); if(!def) return;
  const wrap=document.getElementById('canvas-wrap').getBoundingClientRect();
  addNode(def, {
    x: snapGrid((e.clientX-wrap.left-panX)/scale - 100),
    y: snapGrid((e.clientY-wrap.top -panY)/scale - 30)
  });
}

function findDef(type) { for(const c of NODE_DEFS) for(const n of c.items) if(n.type===type) return n; return null; }
function snapGrid(v)   { return Math.round(v/GRID)*GRID; }
function getCanvasCenter() {
  const w=document.getElementById('canvas-wrap');
  return {x:snapGrid((w.offsetWidth/2-panX)/scale-100), y:snapGrid((w.offsetHeight/2-panY)/scale-30)};
}

// ══════════════════════════════════════════════════════════════
//  KEYBOARD
// ══════════════════════════════════════════════════════════════
function onKeyDown(e) {
  if(e.key==='Escape') { selectNode(null); closeProps(); }
  if(e.key==='Delete' && selectedNode && !e.target.matches('input,textarea,select')) deleteNode(selectedNode.id);
  if(e.key==='f' && !e.target.matches('input,textarea,select')) fitAll();
  if(e.key==='s' && (e.ctrlKey||e.metaKey)) { e.preventDefault(); saveWorkflow(); }
}

// ══════════════════════════════════════════════════════════════

function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

function loadTemplate(name) {
  clearNodesOnly();
  const T=TEMPLATES[name]; if(!T) return;
  const added=[];
  T.nodes.forEach(n=>{
    const def=findDef(n.type); if(!def) return;
    const node=addNode(def,{x:n.x,y:n.y});
    node.label=n.label||def.label;
    updateNodeEl(node.id);
    added.push(node);
  });
  setTimeout(()=>{
    T.connections.forEach(c=>{
      const from=added[c.fi], to=added[c.ti];
      if(!from||!to) return;
      const conn={id:'c'+(connections.length+1),from:from.id,fromPort:c.fp,to:to.id,toPort:c.tp,active:false};
      connections.push(conn);
      drawConnection(conn);
    });
    fitAll();
    log('ok',`تم تحميل قالب: ${name}`);
  },100);
  closeWelcome();
}

function closeWelcome() {
  const w=document.getElementById('welcome');
  w.style.opacity='0'; w.style.transition='opacity .3s';
  setTimeout(()=>w.style.display='none',300);
}

function renderAll() {
  nodes.forEach(n=>renderNode(n));
  renderConnections();
  updateMinimap();
}
