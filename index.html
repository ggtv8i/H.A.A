<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.A.A Flow — محرر Workflow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--surface:#0f1629;--card:#151e35;--card2:#1a2540;
  --border:#1e2d4a;--border2:#243358;
  --accent:#00d4ff;--accent2:#7c3aed;--accent3:#10b981;
  --warn:#f59e0b;--danger:#ef4444;
  --text:#e2e8f0;--muted:#64748b;--muted2:#8b949e;
  --node-h:60px;--node-w:200px;
  --sidebar:260px;--panel:280px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif}

/* ── Sidebar ─────────────────────────────────────────────── */
#sidebar{
  position:fixed;top:0;right:0;width:var(--sidebar);height:100%;
  background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:column;z-index:100;
  transition:transform .3s;
}
#sidebar-header{
  padding:16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.logo{
  font-size:18px;font-weight:900;letter-spacing:-0.5px;
  background:linear-gradient(135deg,#fff 0%,var(--accent) 50%,var(--accent2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#sidebar-search{
  margin:12px;padding:8px 12px;
  background:var(--card);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-family:'Tajawal',sans-serif;font-size:13px;
  outline:none;width:calc(100% - 24px);direction:rtl;
}
#sidebar-search:focus{border-color:var(--accent)}
#node-list{flex:1;overflow-y:auto;padding:8px 12px 12px}
.node-category{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:10px 4px 6px;font-family:'IBM Plex Mono',monospace}
.node-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;cursor:grab;
  border:1px solid transparent;margin-bottom:4px;
  transition:all .15s;font-size:13px;
  user-select:none;
}
.node-item:hover{background:var(--card2);border-color:var(--border2)}
.node-item:active{cursor:grabbing}
.node-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

/* ── Top Bar ──────────────────────────────────────────────── */
#topbar{
  position:fixed;top:0;left:0;right:var(--sidebar);height:50px;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;z-index:99;gap:12px;
}
.tb-left,.tb-right{display:flex;align-items:center;gap:8px}
.tb-btn{
  padding:6px 14px;border-radius:7px;border:1px solid var(--border2);
  background:var(--card);color:var(--text);cursor:pointer;
  font-family:'Tajawal',sans-serif;font-size:13px;font-weight:500;
  transition:all .15s;display:flex;align-items:center;gap:6px;
}
.tb-btn:hover{background:var(--card2);border-color:var(--muted2)}
.tb-btn.primary{background:linear-gradient(135deg,var(--accent2),#4f46e5);border-color:transparent;color:#fff}
.tb-btn.primary:hover{opacity:.9}
.tb-btn.run{background:linear-gradient(135deg,var(--accent3),#059669);border-color:transparent;color:#fff}
.tb-btn.run:hover{opacity:.9}
.tb-btn.danger{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--danger)}
.wf-name{
  background:transparent;border:1px solid transparent;color:var(--text);
  font-family:'Tajawal',sans-serif;font-size:14px;font-weight:500;
  padding:4px 8px;border-radius:6px;outline:none;min-width:150px;text-align:center;
}
.wf-name:hover{border-color:var(--border2)}
.wf-name:focus{border-color:var(--accent);background:var(--card)}

/* ── Canvas ───────────────────────────────────────────────── */
#canvas-wrap{
  position:fixed;top:50px;left:0;right:var(--sidebar);bottom:0;
  overflow:hidden;cursor:default;
}
#canvas{
  position:absolute;top:0;left:0;
  transform-origin:0 0;
}
#grid-svg{position:absolute;top:0;left:0;pointer-events:none}
#connections-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
#temp-conn{stroke:var(--accent);stroke-width:2;fill:none;stroke-dasharray:6 4;pointer-events:none;display:none}

/* ── Nodes ────────────────────────────────────────────────── */
.wf-node{
  position:absolute;min-width:var(--node-w);
  background:var(--card);border:1.5px solid var(--border2);border-radius:12px;
  cursor:grab;user-select:none;transition:border-color .15s,box-shadow .15s;
  z-index:10;
}
.wf-node:hover{border-color:var(--muted);box-shadow:0 0 20px rgba(0,0,0,.4)}
.wf-node.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,212,255,.15)}
.wf-node.running{animation:node-run .6s ease-in-out infinite alternate}
.wf-node.done{border-color:var(--accent3);box-shadow:0 0 12px rgba(16,185,129,.2)}
.wf-node.error{border-color:var(--danger);box-shadow:0 0 12px rgba(239,68,68,.2)}
@keyframes node-run{from{box-shadow:0 0 8px rgba(0,212,255,.3)}to{box-shadow:0 0 24px rgba(0,212,255,.7)}}

.node-header{
  padding:10px 14px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);border-radius:11px 11px 0 0;
}
.node-header-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.node-header-text{flex:1;min-width:0}
.node-title{font-size:13px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-type{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1px}
.node-status{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
.node-status.ok{background:var(--accent3)}
.node-status.err{background:var(--danger)}
.node-status.run{background:var(--accent);animation:blink .5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.node-body{padding:10px 14px;font-size:12px;color:var(--muted2);line-height:1.5}
.node-param{display:flex;justify-content:space-between;margin-bottom:4px}
.node-param-label{color:var(--muted)}
.node-param-val{color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.node-ports{padding:6px 0 10px;display:flex;flex-direction:column;gap:0}
.port-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0}
.port{
  width:12px;height:12px;border-radius:50%;
  border:2px solid var(--border2);background:var(--card);
  cursor:crosshair;transition:all .15s;z-index:20;flex-shrink:0;
  position:relative;
}
.port:hover,.port.hover{border-color:var(--accent);background:var(--accent);box-shadow:0 0 8px rgba(0,212,255,.5)}
.port.out{margin-right:-7px}
.port.in {margin-left:-7px}
.port-label{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;padding:0 8px}

/* ── Props Panel ──────────────────────────────────────────── */
#props-panel{
  position:fixed;bottom:0;left:0;width:var(--panel);
  background:var(--surface);border-top:1px solid var(--border);border-right:1px solid var(--border);
  border-radius:0 12px 0 0;max-height:60%;
  transform:translateY(100%);transition:transform .3s;z-index:101;
  display:flex;flex-direction:column;
}
#props-panel.open{transform:translateY(0)}
#props-header{
  padding:12px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
#props-title{font-size:14px;font-weight:700}
#props-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:2px 6px}
#props-body{padding:16px;overflow-y:auto;flex:1}
.prop-group{margin-bottom:16px}
.prop-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-family:'IBM Plex Mono',monospace}
.prop-input,.prop-select,.prop-textarea{
  width:100%;padding:8px 10px;background:var(--card);
  border:1px solid var(--border2);border-radius:7px;
  color:var(--text);font-family:'Tajawal',sans-serif;font-size:13px;
  outline:none;transition:border-color .15s;resize:vertical;
}
.prop-input:focus,.prop-select:focus,.prop-textarea:focus{border-color:var(--accent)}
.prop-select option{background:var(--card2)}
.prop-toggle{display:flex;align-items:center;justify-content:space-between}
.toggle{width:36px;height:20px;border-radius:10px;background:var(--border2);cursor:pointer;position:relative;transition:background .2s}
.toggle.on{background:var(--accent3)}
.toggle::after{content:'';position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(-16px)}

/* ── Log Panel ────────────────────────────────────────────── */
#log-panel{
  position:fixed;bottom:0;right:var(--sidebar);left:0;
  background:rgba(10,14,26,.95);border-top:1px solid var(--border);
  height:0;transition:height .3s;overflow:hidden;z-index:98;backdrop-filter:blur(8px);
}
#log-panel.open{height:200px}
#log-header{
  padding:8px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;font-size:12px;
}
#log-body{
  height:160px;overflow-y:auto;padding:8px 16px;
  font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:1.7;
}
.log-line{display:block;margin-bottom:1px}
.l-info{color:var(--muted2)}.l-ok{color:var(--accent3)}.l-err{color:var(--danger)}
.l-run{color:var(--accent)}.l-warn{color:var(--warn)}

/* ── Minimap ──────────────────────────────────────────────── */
#minimap{
  position:fixed;bottom:16px;left:16px;width:160px;height:100px;
  background:rgba(15,22,41,.9);border:1px solid var(--border);border-radius:8px;
  overflow:hidden;pointer-events:none;z-index:97;
}
#minimap-canvas{width:100%;height:100%}

/* ── Context Menu ─────────────────────────────────────────── */
#ctx-menu{
  position:fixed;background:var(--card);border:1px solid var(--border2);
  border-radius:9px;padding:6px;z-index:999;display:none;min-width:160px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
}
.ctx-item{
  padding:8px 12px;border-radius:6px;cursor:pointer;
  font-size:13px;display:flex;align-items:center;gap:8px;
  transition:background .1s;
}
.ctx-item:hover{background:var(--card2)}
.ctx-item.danger{color:var(--danger)}
.ctx-divider{height:1px;background:var(--border);margin:4px 0}

/* ── Toast ────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--card2);border:1px solid var(--border2);border-radius:8px;
  padding:10px 20px;font-size:13px;z-index:9999;
  transition:transform .3s;pointer-events:none;
  white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ── Scrollbars ───────────────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── Welcome overlay ─────────────────────────────────────── */
#welcome{
  position:fixed;inset:0;background:rgba(10,14,26,.8);
  display:flex;align-items:center;justify-content:center;z-index:500;
  backdrop-filter:blur(8px);
}
#welcome-card{
  background:var(--surface);border:1px solid var(--border2);border-radius:16px;
  padding:40px;max-width:480px;width:90%;text-align:center;
}
#welcome-card h1{font-size:32px;font-weight:900;margin-bottom:8px;
  background:linear-gradient(135deg,#fff 0%,var(--accent) 50%,var(--accent2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#welcome-card p{color:var(--muted2);margin-bottom:24px;line-height:1.7}
.quick-start{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.qs-btn{
  padding:12px;border-radius:9px;border:1px solid var(--border2);
  background:var(--card);cursor:pointer;font-family:'Tajawal',sans-serif;
  font-size:13px;color:var(--text);transition:all .15s;
}
.qs-btn:hover{background:var(--card2);border-color:var(--muted)}
</style>
</head>
<body>

<!-- Welcome -->
<div id="welcome">
  <div id="welcome-card">
    <h1>⚡ H.A.A Flow</h1>
    <p>محرك أتمتة بصري — اسحب النودات، اربطها، وشغّل الـ Workflow الخاص بك</p>
    <div class="quick-start">
      <div class="qs-btn" onclick="loadTemplate('telegram-bot')">🤖 بوت تيليجرام</div>
      <div class="qs-btn" onclick="loadTemplate('ai-pipeline')">🧠 AI Pipeline</div>
      <div class="qs-btn" onclick="loadTemplate('github-auto')">🐙 GitHub Auto</div>
      <div class="qs-btn" onclick="loadTemplate('data-fetch')">📊 جلب بيانات</div>
    </div>
    <button class="tb-btn primary" onclick="closeWelcome()" style="width:100%;justify-content:center;padding:12px">ابدأ من الصفر →</button>
  </div>
</div>

<!-- Top bar -->
<div id="topbar">
  <div class="tb-left">
    <button class="tb-btn" onclick="zoomIn()" title="تكبير">＋</button>
    <button class="tb-btn" onclick="zoomOut()" title="تصغير">－</button>
    <button class="tb-btn" onclick="fitAll()" title="ملاءمة">⊡</button>
    <span id="zoom-label" style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);min-width:44px">100%</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <input class="wf-name" id="wf-name" value="Workflow جديد" spellcheck="false">
  </div>
  <div class="tb-right">
    <button class="tb-btn" onclick="clearCanvas()">🗑 مسح</button>
    <button class="tb-btn" onclick="saveWorkflow()">💾 حفظ</button>
    <button class="tb-btn run" id="run-btn" onclick="runWorkflow()">▶ تشغيل</button>
  </div>
</div>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <span class="logo">H.A.A Flow</span>
    <span style="font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace">v1.0</span>
  </div>
  <input id="sidebar-search" placeholder="🔍 ابحث عن نود..." oninput="filterNodes(this.value)">
  <div id="node-list"></div>
</div>

<!-- Canvas -->
<div id="canvas-wrap"
  onmousedown="canvasMouseDown(event)"
  onmousemove="canvasMouseMove(event)"
  onmouseup="canvasMouseUp(event)"
  onwheel="canvasWheel(event)"
  oncontextmenu="return false"
  ondragover="e=>e.preventDefault()"
  ondrop="canvasDrop(event)">
  <svg id="grid-svg" width="100%" height="100%"></svg>
  <div id="canvas">
    <svg id="connections-svg" style="position:absolute;top:0;left:0;width:20000px;height:20000px;overflow:visible">
      <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L6,3 L0,6 Z" fill="var(--muted)"/>
        </marker>
        <marker id="arrowhead-active" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L6,3 L0,6 Z" fill="var(--accent3)"/>
        </marker>
      </defs>
      <path id="temp-conn" fill="none"/>
    </svg>
  </div>
</div>

<!-- Props panel -->
<div id="props-panel">
  <div id="props-header">
    <span id="props-title">خصائص النود</span>
    <button id="props-close" onclick="closeProps()">✕</button>
  </div>
  <div id="props-body"></div>
</div>

<!-- Log panel -->
<div id="log-panel">
  <div id="log-header">
    <span style="color:var(--accent);font-family:'IBM Plex Mono',monospace">EXECUTION LOG</span>
    <div style="display:flex;gap:8px">
      <button class="tb-btn" onclick="clearLog()" style="padding:2px 10px;font-size:11px">مسح</button>
      <button class="tb-btn" onclick="toggleLog()" style="padding:2px 10px;font-size:11px">إغلاق</button>
    </div>
  </div>
  <div id="log-body"></div>
</div>

<!-- Minimap -->
<div id="minimap"><canvas id="minimap-canvas"></canvas></div>

<!-- Context Menu -->
<div id="ctx-menu"></div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
// NODE DEFINITIONS
// ══════════════════════════════════════════════════════════════
const NODE_DEFS = [
  {cat:'⚡ محفزات',items:[
    {type:'webhook',      label:'Webhook',         icon:'🌐', color:'#1e3a5f', iconBg:'#1e4a8a', desc:'HTTP Webhook trigger',
     ports:{in:[],out:['output']},
     params:[{k:'path',l:'المسار',v:'/webhook',t:'text'},{k:'method',l:'الطريقة',v:'POST',t:'select',opts:['GET','POST','PUT','DELETE']}]},
    {type:'schedule',     label:'جدول زمني',       icon:'⏰', color:'#1e3a3f', iconBg:'#0f6e56', desc:'Cron schedule',
     ports:{in:[],out:['output']},
     params:[{k:'cron',l:'Cron',v:'0 9 * * *',t:'text'},{k:'tz',l:'المنطقة الزمنية',v:'Asia/Baghdad',t:'text'}]},
    {type:'telegram_trigger',label:'Telegram In',  icon:'✈', color:'#1a2d3f', iconBg:'#0077b5', desc:'استقبال رسالة تيليجرام',
     ports:{in:[],out:['message','chat_id']},
     params:[{k:'token',l:'Bot Token',v:'',t:'password'},{k:'commands',l:'الأوامر',v:'/start,/help',t:'text'}]},
    {type:'github_event', label:'GitHub Event',   icon:'🐙', color:'#1a2433', iconBg:'#333',     desc:'GitHub webhook event',
     ports:{in:[],out:['payload']},
     params:[{k:'event',l:'الحدث',v:'push',t:'select',opts:['push','pull_request','issues','release']}]},
  ]},
  {cat:'🧠 ذكاء اصطناعي',items:[
    {type:'claude',       label:'Claude AI',       icon:'🤖', color:'#2d1e3f', iconBg:'#7c3aed', desc:'معالجة AI بـ Claude',
     ports:{in:['prompt'],out:['response','tokens']},
     params:[{k:'model',l:'النموذج',v:'claude-opus-4-5',t:'select',opts:['claude-opus-4-5','claude-sonnet-4-6','claude-haiku-4-5-20251001']},{k:'max_tokens',l:'Max Tokens',v:'1000',t:'text'},{k:'system',l:'System Prompt',v:'أنت مساعد مفيد.',t:'textarea'}]},
    {type:'openai',       label:'OpenAI',          icon:'✨', color:'#1a2d1f', iconBg:'#10a37f', desc:'OpenAI GPT model',
     ports:{in:['prompt'],out:['response']},
     params:[{k:'model',l:'النموذج',v:'gpt-4o',t:'select',opts:['gpt-4o','gpt-4-turbo','gpt-3.5-turbo']},{k:'temperature',l:'Temperature',v:'0.7',t:'text'}]},
    {type:'text_classify', label:'تصنيف نص',      icon:'🏷', color:'#2d2a1e', iconBg:'#b45309', desc:'تصنيف النصوص',
     ports:{in:['text'],out:['category','confidence']},
     params:[{k:'labels',l:'التصنيفات',v:'إيجابي,سلبي,محايد',t:'text'}]},
  ]},
  {cat:'⚙️ منطق',items:[
    {type:'if',           label:'شرط If',          icon:'❓', color:'#2d2a1a', iconBg:'#d97706', desc:'تفرع منطقي',
     ports:{in:['input'],out:['true','false']},
     params:[{k:'field',l:'الحقل',v:'status',t:'text'},{k:'op',l:'العملية',v:'equals',t:'select',opts:['equals','not_equals','contains','greater_than','less_than']},{k:'value',l:'القيمة',v:'active',t:'text'}]},
    {type:'switch',       label:'Switch',          icon:'🔀', color:'#2d1e1e', iconBg:'#9f1239', desc:'تعدد الفروع',
     ports:{in:['input'],out:['case1','case2','default']},
     params:[{k:'field',l:'الحقل',v:'type',t:'text'}]},
    {type:'loop',         label:'حلقة تكرار',     icon:'🔄', color:'#1e2d2d', iconBg:'#0e7490', desc:'Loop على مصفوفة',
     ports:{in:['array'],out:['item','index','done']},
     params:[{k:'field',l:'المصفوفة',v:'items',t:'text'}]},
    {type:'merge',        label:'دمج',             icon:'🔗', color:'#1e2d1e', iconBg:'#166534', desc:'دمج مدخلين',
     ports:{in:['input1','input2'],out:['merged']},
     params:[{k:'mode',l:'الوضع',v:'append',t:'select',opts:['append','merge','zip']}]},
    {type:'wait',         label:'انتظار',          icon:'⏸', color:'#2d2d1e', iconBg:'#713f12', desc:'تأخير التنفيذ',
     ports:{in:['input'],out:['output']},
     params:[{k:'delay',l:'التأخير (ث)',v:'3',t:'text'}]},
  ]},
  {cat:'📡 إجراءات',items:[

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
let nodes = [], connections = [], selectedNode = null;
let scale = 1, panX = 0, panY = 0;
let isPanning = false, panStart = {x:0,y:0};
let isDragging = false, dragNode = null, dragOffset = {x:0,y:0};
let isConnecting = false, connStart = null, tempPath = null;
let nodeIdCounter = 0;
const GRID = 20;

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
function init(){
  buildSidebar();
  drawGrid();
  renderAll();
  window.addEventListener('resize', ()=>{drawGrid();updateMinimap()});
  document.addEventListener('keydown', onKeyDown);
  document.addEventListener('click', e=>{
    if(!e.target.closest('#ctx-menu')) hideCtxMenu();
  });
}

// ══════════════════════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════════════════════
function buildSidebar(filter=''){
  const list = document.getElementById('node-list');
  list.innerHTML = '';
  NODE_DEFS.forEach(cat=>{
    const items = cat.items.filter(n=>!filter||n.label.includes(filter)||n.desc.includes(filter));
    if(!items.length) return;
    const catEl = document.createElement('div');
    catEl.className='node-category';catEl.textContent=cat.cat;
    list.appendChild(catEl);
    items.forEach(def=>{
      const el = document.createElement('div');
      el.className='node-item';
      el.draggable=true;
      el.innerHTML=`<div class="node-icon" style="background:${def.iconBg}20;border:1px solid ${def.iconBg}40">${def.icon}</div>
        <div><div style="font-size:13px;font-weight:600">${def.label}</div>
        <div style="font-size:11px;color:var(--muted)">${def.desc}</div></div>`;
      el.addEventListener('dragstart',e=>{
        e.dataTransfer.setData('nodeType',def.type);
      });
      el.addEventListener('click',()=>addNode(def, getCanvasCenter()));
      list.appendChild(el);
    });
  });
}
function filterNodes(v){ buildSidebar(v); }

// ══════════════════════════════════════════════════════════════
// CANVAS DROP
// ══════════════════════════════════════════════════════════════
function canvasDrop(e){
  e.preventDefault();
  const type = e.dataTransfer.getData('nodeType');
  if(!type) return;
  const def = findDef(type);
  if(!def) return;
  const wrap = document.getElementById('canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  const cx = (e.clientX - rect.left - panX) / scale;
  const cy = (e.clientY - rect.top - panY) / scale;
  addNode(def, {x: snapGrid(cx - 100), y: snapGrid(cy - 30)});
}

function findDef(type){ for(const c of NODE_DEFS) for(const n of c.items) if(n.type===type) return n; return null; }
function snapGrid(v){ return Math.round(v/GRID)*GRID; }
function getCanvasCenter(){
  const w=document.getElementById('canvas-wrap');
  return {x:snapGrid((w.offsetWidth/2-panX)/scale-100), y:snapGrid((w.offsetHeight/2-panY)/scale-30)};
}

// ══════════════════════════════════════════════════════════════
// NODES
// ══════════════════════════════════════════════════════════════
function addNode(def, pos){
  const node = {
    id:'n'+(++nodeIdCounter), type:def.type, label:def.label,
    icon:def.icon, color:def.color, iconBg:def.iconBg,
    x:pos.x, y:pos.y, ports:def.ports,
    params: def.params ? def.params.map(p=>({...p})) : [],
    status:'idle'
  };
  nodes.push(node);
  renderNode(node);
  updateMinimap();
  return node;
}

function renderNode(node){
  const el = document.createElement('div');
  el.className='wf-node';
  el.id='node-'+node.id;
  el.style.cssText=`left:${node.x}px;top:${node.y}px;`;

  const outs = node.ports.out||[];
  const ins  = node.ports.in||[];
  const maxP = Math.max(outs.length, ins.length, 1);

  el.innerHTML=`
    <div class="node-header" style="background:${node.color}">
      <div class="node-header-icon" style="background:${node.iconBg}">${node.icon}</div>
      <div class="node-header-text">
        <div class="node-title">${node.label}</div>
        <div class="node-type">${node.type}</div>
      </div>
      <div class="node-status" id="status-${node.id}"></div>
    </div>
    <div class="node-body" id="body-${node.id}">
      ${node.params.slice(0,2).map(p=>`
        <div class="node-param">
          <span class="node-param-label">${p.l}</span>
          <span class="node-param-val">${p.v||'—'}</span>
        </div>`).join('')}
    </div>
    <div class="node-ports" id="ports-${node.id}">
      ${Array.from({length:maxP},(_,i)=>`
        <div class="port-row" style="position:relative;height:22px;">
          ${ins[i]?`<div class="port in" data-node="${node.id}" data-port="${ins[i]}" data-dir="in" title="${ins[i]}" onmousedown="portMouseDown(event,this)"></div><span class="port-label" style="margin-right:4px">${ins[i]}</span>`:'<div style="width:12px;height:12px;flex-shrink:0"></div><span></span>'}
          <span style="flex:1"></span>
          ${outs[i]?`<span class="port-label" style="margin-left:4px">${outs[i]}</span><div class="port out" data-node="${node.id}" data-port="${outs[i]}" data-dir="out" title="${outs[i]}" onmousedown="portMouseDown(event,this)"></div>`:'<span></span><div style="width:12px;height:12px;flex-shrink:0"></div>'}
        </div>`).join('')}
    </div>`;

  el.addEventListener('mousedown', e=>nodeMouseDown(e, node.id));
  el.addEventListener('dblclick', ()=>openProps(node.id));
  el.addEventListener('contextmenu', e=>showNodeCtxMenu(e, node.id));

  document.getElementById('canvas').appendChild(el);
}

function updateNodeEl(id){
  const node = nodes.find(n=>n.id===id);
  if(!node) return;
  const el = document.getElementById('node-'+id);
  if(!el) return;
  const body = document.getElementById('body-'+id);
  if(body) body.innerHTML = node.params.slice(0,2).map(p=>`
    <div class="node-param">
      <span class="node-param-label">${p.l}</span>
      <span class="node-param-val">${p.v||'—'}</span>
    </div>`).join('');
}

function setNodeStatus(id, status){
  const node = nodes.find(n=>n.id===id);
  if(node) node.status=status;
  const el = document.getElementById('node-'+id);
  if(!el) return;
  el.className='wf-node'+(id===selectedNode?.id?' selected':'');
  if(status==='running') el.classList.add('running');
  if(status==='done') el.classList.add('done');
  if(status==='error') el.classList.add('error');
  const dot = document.getElementById('status-'+id);
  if(dot){ dot.className='node-status'+(status==='done'?' ok':status==='error'?' err':status==='running'?' run':''); }
}

// ══════════════════════════════════════════════════════════════
// CONNECTIONS
// ══════════════════════════════════════════════════════════════
function renderConnections(){
  const svg = document.getElementById('connections-svg');
  svg.querySelectorAll('path.conn-path').forEach(p=>p.remove());
  connections.forEach(conn=>drawConnection(conn));
}

function drawConnection(conn){
  const p1 = getPortPos(conn.from, conn.fromPort, 'out');
  const p2 = getPortPos(conn.to,   conn.toPort,   'in');
  if(!p1||!p2) return;
  const path = createConnPath(p1, p2, conn.active);
  path.classList.add('conn-path');
  path.dataset.connId = conn.id;
  path.addEventListener('contextmenu', e=>showConnCtxMenu(e, conn.id));
  path.addEventListener('mouseenter', ()=>path.style.strokeWidth='2.5');
  path.addEventListener('mouseleave', ()=>path.style.strokeWidth=conn.active?'2':'1.5');
  document.getElementById('connections-svg').appendChild(path);
}

function createConnPath(p1, p2, active=false){
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  const dx = Math.abs(p2.x-p1.x)*0.5;
  const d = `M${p1.x},${p1.y} C${p1.x+dx},${p1.y} ${p2.x-dx},${p2.y} ${p2.x},${p2.y}`;
  path.setAttribute('d', d);
  path.setAttribute('fill','none');
  path.setAttribute('stroke', active ? '#10b981' : '#3b5280');
  path.setAttribute('stroke-width', active ? '2' : '1.5');
  path.setAttribute('marker-end', `url(#${active?'arrowhead-active':'arrowhead'})`);
  path.style.cursor='pointer';
  if(active) path.setAttribute('stroke-dasharray','0');
  return path;
}

function getPortPos(nodeId, portName, dir){
  const node = nodes.find(n=>n.id===nodeId);
  if(!node) return null;
  const el = document.getElementById('node-'+nodeId);
  if(!el) return null;
  const port = el.querySelector(`.port.${dir}[data-port="${portName}"]`);
  if(!port) return null;
  const nr = el.getBoundingClientRect();
  const pr = port.getBoundingClientRect();
  const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
  return {
    x: (pr.left + pr.width/2 - wrap.left - panX) / scale,
    y: (pr.top  + pr.height/2 - wrap.top  - panY) / scale,
  };
}

// ══════════════════════════════════════════════════════════════
// PORT CONNECTING
// ══════════════════════════════════════════════════════════════
function portMouseDown(e, portEl){
  e.stopPropagation();
  isConnecting = true;
  connStart = {
    nodeId: portEl.dataset.node,
    port:   portEl.dataset.port,
    dir:    portEl.dataset.dir
  };
  const pos = getPortPos(connStart.nodeId, connStart.port, connStart.dir);
  if(!pos) return;
  tempPath = document.getElementById('temp-conn');
  tempPath.style.display='block';
  updateTempConn(pos, pos);
}

function updateTempConn(p1, p2){
  if(!tempPath) return;
  const dx = Math.abs(p2.x-p1.x)*0.5;
  tempPath.setAttribute('d',`M${p1.x},${p1.y} C${p1.x+dx},${p1.y} ${p2.x-dx},${p2.y} ${p2.x},${p2.y}`);
  tempPath.setAttribute('stroke','var(--accent)');
  tempPath.setAttribute('stroke-width','2');
  tempPath.setAttribute('stroke-dasharray','6 4');
}

// ══════════════════════════════════════════════════════════════
// CANVAS EVENTS
// ══════════════════════════════════════════════════════════════
function canvasMouseDown(e){
  if(e.button===2){ /* right click */ return; }
  if(e.target.id==='canvas-wrap'||e.target.id==='grid-svg'){
    selectNode(null);
    isPanning=true;
    panStart={x:e.clientX-panX,y:e.clientY-panY};
    document.getElementById('canvas-wrap').style.cursor='grabbing';
  }
}

function canvasMouseMove(e){
  if(isPanning){
    panX=e.clientX-panStart.x;
    panY=e.clientY-panStart.y;
    applyTransform();
    updateMinimap();
  }
  if(isDragging && dragNode){
    const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
    const nx = snapGrid((e.clientX - wrap.left - panX) / scale - dragOffset.x);
    const ny = snapGrid((e.clientY - wrap.top  - panY) / scale - dragOffset.y);
    dragNode.x=nx; dragNode.y=ny;
    const el = document.getElementById('node-'+dragNode.id);
    if(el){ el.style.left=nx+'px'; el.style.top=ny+'px'; }
    renderConnections();
    updateMinimap();
  }
  if(isConnecting && connStart){
    const pos = getPortPos(connStart.nodeId, connStart.port, connStart.dir);
    if(!pos) return;
    const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
    const mp = {x:(e.clientX-wrap.left-panX)/scale, y:(e.clientY-wrap.top-panY)/scale};
    if(connStart.dir==='out') updateTempConn(pos, mp);
    else updateTempConn(mp, pos);
    // Highlight hovered ports
    document.querySelectorAll('.port').forEach(p=>p.classList.remove('hover'));
    const target = document.elementFromPoint(e.clientX, e.clientY);
    if(target && target.classList.contains('port')) target.classList.add('hover');
  }
}

function canvasMouseUp(e){
  document.getElementById('canvas-wrap').style.cursor='default';
  isPanning=false;
  isDragging=false; dragNode=null;

  if(isConnecting){
    isConnecting=false;
    if(tempPath) tempPath.style.display='none';
    document.querySelectorAll('.port').forEach(p=>p.classList.remove('hover'));
    const target = document.elementFromPoint(e.clientX, e.clientY);
    if(target && target.classList.contains('port') && target.dataset.node !== connStart?.nodeId){
      const end = {nodeId:target.dataset.node, port:target.dataset.port, dir:target.dataset.dir};
      let from=connStart, to=end;
      if(from.dir==='in'){ [from,to]=[to,from]; }
      if(from.dir==='out' && to.dir==='in'){
        // Check no duplicate
        const dup = connections.find(c=>c.from===from.nodeId&&c.fromPort===from.port&&c.to===to.nodeId&&c.toPort===to.port);
        if(!dup){
          const conn={id:'c'+(connections.length+1),from:from.nodeId,fromPort:from.port,to:to.nodeId,toPort:to.port,active:false};
          connections.push(conn);
          drawConnection(conn);
          log('ok',`تم الربط: ${from.nodeId}[${from.port}] → ${to.nodeId}[${to.port}]`);
          updateMinimap();
        }
      }
    }
    connStart=null;
  }
}

function canvasWheel(e){
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
  const mx = e.clientX - wrap.left, my = e.clientY - wrap.top;
  panX = mx - (mx - panX) * factor;
  panY = my - (my - panY) * factor;
  scale = Math.max(0.2, Math.min(2, scale * factor));
  applyTransform();
  updateMinimap();
}

function applyTransform(){
  document.getElementById('canvas').style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;
  document.getElementById('zoom-label').textContent=Math.round(scale*100)+'%';
  drawGrid();
}

// ══════════════════════════════════════════════════════════════
// NODE DRAG
// ══════════════════════════════════════════════════════════════
function nodeMouseDown(e, id){
  if(e.target.classList.contains('port')) return;
  if(e.button===2) return;
  e.stopPropagation();
  selectNode(id);
  isDragging=true;
  dragNode = nodes.find(n=>n.id===id);
  const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
  const el = document.getElementById('node-'+id);
  const nr = el.getBoundingClientRect();
  dragOffset={
    x:(e.clientX-wrap.left-panX)/scale - dragNode.x,
    y:(e.clientY-wrap.top-panY)/scale  - dragNode.y
  };
}

// ══════════════════════════════════════════════════════════════
// SELECTION
// ══════════════════════════════════════════════════════════════
function selectNode(id){
  if(selectedNode) {
    const old = document.getElementById('node-'+selectedNode.id);
    if(old) old.classList.remove('selected');
  }
  selectedNode = id ? nodes.find(n=>n.id===id) : null;
  if(selectedNode){
    const el = document.getElementById('node-'+id);
    if(el) el.classList.add('selected');
  }
  if(!id) closeProps();
}

// ══════════════════════════════════════════════════════════════
// PROPERTIES PANEL
// ══════════════════════════════════════════════════════════════
function openProps(id){
  const node = nodes.find(n=>n.id===id);
  if(!node) return;
  selectNode(id);
  document.getElementById('props-title').textContent=`${node.icon} ${node.label}`;
  const body = document.getElementById('props-body');
  body.innerHTML = `
    <div class="prop-group">
      <div class="prop-label">اسم النود</div>
      <input class="prop-input" value="${node.label}" onchange="node_label(event,'${id}')">
    </div>
    ${(node.params||[]).map((p,i)=>`
      <div class="prop-group">
        <div class="prop-label">${p.l}</div>
        ${p.t==='textarea'
          ? `<textarea class="prop-textarea" rows="3" onchange="node_param(event,'${id}',${i})">${p.v||''}</textarea>`
          : p.t==='select'
            ? `<select class="prop-select" onchange="node_param(event,'${id}',${i})">${(p.opts||[]).map(o=>`<option${o===p.v?' selected':''}>${o}</option>`).join('')}</select>`
            : `<input class="prop-input" type="${p.t==='password'?'password':'text'}" value="${p.v||''}" onchange="node_param(event,'${id}',${i})">`
        }
      </div>`).join('')}
    <div class="prop-group">
      <div class="prop-toggle">
        <div class="prop-label">تفعيل النود</div>
        <div class="toggle on" onclick="this.classList.toggle('on')"></div>
      </div>
    </div>
    <div style="margin-top:16px">
      <button class="tb-btn danger" onclick="deleteNode('${id}')" style="width:100%;justify-content:center">🗑 حذف النود</button>
    </div>`;
  document.getElementById('props-panel').classList.add('open');
}

window.node_label = (e, id)=>{
  const node=nodes.find(n=>n.id===id);
  if(node){ node.label=e.target.value; const t=document.querySelector('#node-'+id+' .node-title'); if(t) t.textContent=e.target.value; }
};
window.node_param = (e, id, i)=>{
  const node=nodes.find(n=>n.id===id);
  if(node){ node.params[i].v=e.target.value; updateNodeEl(id); }
};

function closeProps(){
  document.getElementById('props-panel').classList.remove('open');
}

// ══════════════════════════════════════════════════════════════
// CONTEXT MENUS
// ══════════════════════════════════════════════════════════════
function showNodeCtxMenu(e, id){
  e.preventDefault();
  const menu = document.getElementById('ctx-menu');
  menu.style.display='block';
  menu.style.left=e.clientX+'px';
  menu.style.top=e.clientY+'px';
  menu.innerHTML=`
    <div class="ctx-item" onclick="openProps('${id}');hideCtxMenu()">⚙️ خصائص</div>
    <div class="ctx-item" onclick="duplicateNode('${id}');hideCtxMenu()">📋 نسخ</div>
    <div class="ctx-item" onclick="runSingleNode('${id}');hideCtxMenu()">▶ تشغيل هذا النود</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item danger" onclick="deleteNode('${id}');hideCtxMenu()">🗑 حذف</div>`;
}

function showConnCtxMenu(e, connId){
  e.preventDefault();
  const menu = document.getElementById('ctx-menu');
  menu.style.display='block';
  menu.style.left=e.clientX+'px';
  menu.style.top=e.clientY+'px';
  menu.innerHTML=`<div class="ctx-item danger" onclick="deleteConnection('${connId}');hideCtxMenu()">🗑 حذف الاتصال</div>`;
}

function hideCtxMenu(){ document.getElementById('ctx-menu').style.display='none'; }

// ══════════════════════════════════════════════════════════════
// NODE OPERATIONS
// ══════════════════════════════════════════════════════════════
function deleteNode(id){
  nodes=nodes.filter(n=>n.id!==id);
  connections=connections.filter(c=>c.from!==id&&c.to!==id);
  const el=document.getElementById('node-'+id);
  if(el) el.remove();
  renderConnections();
  if(selectedNode?.id===id) closeProps();
  updateMinimap();
  log('warn',`تم حذف النود: ${id}`);
}

function duplicateNode(id){
  const src = nodes.find(n=>n.id===id);
  if(!src) return;
  const def = findDef(src.type);
  if(!def) return;
  const n = addNode(def, {x:src.x+40,y:src.y+40});
  n.params = src.params.map(p=>({...p}));
  updateNodeEl(n.id);
  toast('تم نسخ النود');
}

function deleteConnection(connId){
  connections=connections.filter(c=>c.id!==connId);
  renderConnections();
  updateMinimap();
}

// ══════════════════════════════════════════════════════════════
// WORKFLOW EXECUTION (SIMULATION)
// ══════════════════════════════════════════════════════════════
async function runWorkflow(){
  if(!nodes.length){toast('أضف نودات أولاً');return;}
  const btn=document.getElementById('run-btn');
  btn.disabled=true;btn.textContent='⏳ جارٍ...';
  document.getElementById('log-panel').classList.add('open');
  log('run','════ بدء تنفيذ الـ Workflow ════');

  // Reset
  nodes.forEach(n=>setNodeStatus(n.id,'idle'));
  connections.forEach(c=>{ c.active=false; });
  renderConnections();

  // Topological sort
  const order = topologicalSort();
  log('info',`ترتيب التنفيذ: ${order.map(n=>n.label).join(' → ')}`);

  for(const node of order){
    setNodeStatus(node.id,'running');
    log('run',`▶ تشغيل: ${node.icon} ${node.label} (${node.type})`);
    await sleep(600+Math.random()*800);

    // Simulate result
    const success = Math.random()>0.1;
    if(success){
      setNodeStatus(node.id,'done');
      log('ok',`✓ اكتمل: ${node.label}`);
      // Activate outgoing connections
      connections.filter(c=>c.from===node.id).forEach(c=>{c.active=true;});
      renderConnections();
    } else {
      setNodeStatus(node.id,'error');
      log('err',`✗ فشل: ${node.label}`);
      // Stop on error (optional)
    }
    await sleep(200);
  }

  log('ok','════ انتهى التنفيذ ════');
  btn.disabled=false;btn.innerHTML='▶ تشغيل';
  toast('اكتمل التنفيذ!');
  updateMinimap();
}

async function runSingleNode(id){
  const node=nodes.find(n=>n.id===id);
  if(!node) return;
  document.getElementById('log-panel').classList.add('open');
  setNodeStatus(id,'running');
  log('run',`▶ تشغيل فردي: ${node.label}`);
  await sleep(800);
  setNodeStatus(id,'done');
  log('ok',`✓ اكتمل: ${node.label}`);
}

function topologicalSort(){
  const visited=new Set(), result=[];
  const adj={};
  nodes.forEach(n=>{adj[n.id]=[];});
  connections.forEach(c=>{ if(adj[c.from]) adj[c.from].push(c.to); });
  function visit(id){
    if(visited.has(id)) return;
    visited.add(id);
    (adj[id]||[]).forEach(visit);
    result.unshift(nodes.find(n=>n.id===id));
  }
  nodes.forEach(n=>visit(n.id));
  return result.filter(Boolean);
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ══════════════════════════════════════════════════════════════
// GRID
// ══════════════════════════════════════════════════════════════
function drawGrid(){
  const wrap=document.getElementById('canvas-wrap');
  const svg=document.getElementById('grid-svg');
  const W=wrap.offsetWidth, H=wrap.offsetHeight;
  svg.setAttribute('width',W);svg.setAttribute('height',H);
  const gSize=GRID*scale;
  const ox=((panX%gSize)+gSize)%gSize;
  const oy=((panY%gSize)+gSize)%gSize;
  let d='';
  for(let x=ox;x<W;x+=gSize) d+=`M${x},0 L${x},${H}`;
  for(let y=oy;y<H;y+=gSize) d+=`M0,${y} L${W},${y}`;
  svg.innerHTML=`<path d="${d}" stroke="rgba(255,255,255,0.03)" stroke-width="1" fill="none"/>`;
}

// ══════════════════════════════════════════════════════════════
// MINIMAP
// ══════════════════════════════════════════════════════════════
function updateMinimap(){
  const c=document.getElementById('minimap-canvas');
  const ctx=c.getContext('2d');
  c.width=160;c.height=100;
  ctx.clearRect(0,0,160,100);
  if(!nodes.length) return;
  const xs=nodes.map(n=>n.x), ys=nodes.map(n=>n.y);
  const minX=Math.min(...xs)-20, maxX=Math.max(...xs)+220;
  const minY=Math.min(...ys)-20, maxY=Math.max(...ys)+80;
  const rw=maxX-minX||200, rh=maxY-minY||120;
  const scX=140/rw, scY=80/rh, sc=Math.min(scX,scY);
  const offX=10, offY=10;
  const tx=n=>(n-minX)*sc+offX, ty=n=>(n-minY)*sc+offY;
  connections.forEach(conn=>{
    const fn=nodes.find(n=>n.id===conn.from), tn=nodes.find(n=>n.id===conn.to);
    if(!fn||!tn) return;
    ctx.strokeStyle=conn.active?'#10b981':'#3b5280';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(tx(fn.x+100),ty(fn.y+30));
    ctx.lineTo(tx(tn.x),ty(tn.y+30));
    ctx.stroke();
  });
  nodes.forEach(node=>{
    ctx.fillStyle=node.color||'#151e35';
    ctx.strokeStyle=node.status==='done'?'#10b981':node.status==='error'?'#ef4444':'#3b5280';
    ctx.lineWidth=1;
    const x=tx(node.x),y=ty(node.y),w=200*sc,h=60*sc;
    ctx.beginPath();
    ctx.roundRect(x,y,w,h,3);
    ctx.fill();ctx.stroke();
  });
  // Viewport indicator
  const wrap=document.getElementById('canvas-wrap');
  const vx=tx(-panX/scale), vy=ty(-panY/scale);
  const vw=wrap.offsetWidth/scale*sc, vh=wrap.offsetHeight/scale*sc;
  ctx.strokeStyle='rgba(0,212,255,0.5)';ctx.lineWidth=1;
  ctx.strokeRect(vx,vy,vw,vh);
}

// ══════════════════════════════════════════════════════════════
// ZOOM
// ══════════════════════════════════════════════════════════════
function zoomIn(){ adjustZoom(1.2); }
function zoomOut(){ adjustZoom(0.8); }
function adjustZoom(f){
  const wrap=document.getElementById('canvas-wrap');
  const cx=wrap.offsetWidth/2, cy=wrap.offsetHeight/2;
  panX=cx-(cx-panX)*f; panY=cy-(cy-panY)*f;
  scale=Math.max(0.2,Math.min(2,scale*f));
  applyTransform();updateMinimap();
}
function fitAll(){
  if(!nodes.length){scale=1;panX=0;panY=0;applyTransform();return;}
  const wrap=document.getElementById('canvas-wrap');
  const xs=nodes.map(n=>n.x),ys=nodes.map(n=>n.y);
  const minX=Math.min(...xs)-40,maxX=Math.max(...xs)+240;
  const minY=Math.min(...ys)-40,maxY=Math.max(...ys)+100;
  const fw=wrap.offsetWidth,fh=wrap.offsetHeight;
  scale=Math.min(fw/(maxX-minX),fh/(maxY-minY),1)*0.9;
  panX=fw/2-((minX+maxX)/2)*scale;
  panY=fh/2-((minY+maxY)/2)*scale;
  applyTransform();updateMinimap();
}

// ══════════════════════════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════════════════════════
function onKeyDown(e){
  if(e.key==='Escape'){selectNode(null);closeProps();}
  if(e.key==='Delete'&&selectedNode&&!e.target.matches('input,textarea,select')){
    deleteNode(selectedNode.id);
  }
  if(e.key==='f'&&!e.target.matches('input,textarea,select')) fitAll();
}

}

// TEMPLATES
// ══════════════════════════════════════════════════════════════
function loadTemplate(name){
  clearNodesOnly();
  const T = TEMPLATES[name];
  if(!T) return;
  T.nodes.forEach(n=>{
    const def=findDef(n.type);
    if(!def) return;
    const node=addNode(def,{x:n.x,y:n.y});
    node.label=n.label||def.label;
    if(n.params) node.params=n.params;
    updateNodeEl(node.id);
  });
  setTimeout(()=>{
    T.connections.forEach(c=>{
      const from=nodes[c.fi]||null, to=nodes[c.ti]||null;
      if(!from||!to) return;
      const conn={id:'c'+(connections.length+1),from:from.id,fromPort:c.fp,to:to.id,toPort:c.tp,active:false};
      connections.push(conn);
      drawConnection(conn);
    });
    fitAll();
    log('ok',`تم تحميل قالب: ${name}`);
  },100);
  closeWelcome();
}
